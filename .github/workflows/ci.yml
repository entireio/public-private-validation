name: Tests
on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4
      - name: Build
        run: mise run build
      - name: Test
        run: mise run test
